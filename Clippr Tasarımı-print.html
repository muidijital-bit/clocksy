<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>Clippr — Print</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="tokens.css"/>

<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { font-family: 'Geist', system-ui, sans-serif; color: var(--text); }

  .page-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #908a7e;
    padding: 14px 24px 10px;
    border-bottom: 1px solid #e6e3da;
    background: #fafaf7;
  }

  .print-page {
    width: 1440px;
    margin: 0 auto;
    background: #fff;
    break-after: page;
    page-break-after: always;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .print-page:last-child { break-after: auto; page-break-after: auto; }

  .print-frame {
    width: 1440px;
    background: var(--bg);
    overflow: hidden;
  }

  @page {
    size: 1440px 980px;
    margin: 0;
  }

  @media print {
    html, body { background: #fff; }
    .page-label { background: #fafaf7 !important; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .print-page {
      break-after: page;
      page-break-after: always;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* hide tweaks/canvas chrome if any leaks in */
    .tweaks-panel, [data-canvas-chrome] { display: none !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="customer.jsx"></script>
<script type="text/babel" src="barber.jsx"></script>

<script type="text/babel">
function PrintFrame({ label, w = 1440, h = 900, children }) {
  return (
    <div className="print-page">
      <div className="page-label">{label}</div>
      <div className="print-frame" style={{ width: w, height: h }}>
        {children}
      </div>
    </div>
  );
}

function PrintApp() {
  return (
    <>
      <PrintFrame label="01 · Hero / Landing"><HeroScreen/></PrintFrame>
      <PrintFrame label="02 · Listing — Grid"><ListingScreen/></PrintFrame>
      <PrintFrame label="02b · Listing — Map"><ListingScreen mapView/></PrintFrame>
      <PrintFrame label="03 · Business Profile" h={1400}><ProfileScreen/></PrintFrame>
      <PrintFrame label="04a · Booking — Adım 1 (Usta)"><BookingScreen step={1}/></PrintFrame>
      <PrintFrame label="04b · Booking — Adım 2 (Tarih)"><BookingScreen step={2}/></PrintFrame>
      <PrintFrame label="04c · Booking — Adım 3 (Onay)"><BookingScreen step={3}/></PrintFrame>
      <PrintFrame label="05 · Müşteri Dashboard" h={1100}><DashboardScreen/></PrintFrame>
      <PrintFrame label="07 · kuaför Dashboard" h={1100}><BarberDashScreen/></PrintFrame>
      <PrintFrame label="08 · Randevu Detay"><ApptDetailScreen/></PrintFrame>
      <PrintFrame label="09 · Takvim Yönetimi" h={1100}><ScheduleScreen/></PrintFrame>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

// Auto-print after fonts + JSX render settle
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>

</body>
</html>
